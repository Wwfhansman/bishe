<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>语音交互测试</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --border: #d9dee5;
      --text: #1f2933;
      --muted: #52606d;
      --accent: #1769aa;
      --accent-weak: #e8f1f8;
      --danger: #b42318;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f7f9fb 0%, #edf2f7 100%);
      color: var(--text);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 32px;
    }

    .hero {
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.primary:hover {
      filter: brightness(0.96);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px 16px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .value {
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }

    .status-ready {
      color: #127c4f;
    }

    .status-error {
      color: var(--danger);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .grid .card.full {
      grid-column: 1 / -1;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.6;
      min-height: 180px;
      max-height: 360px;
      overflow: auto;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="hero">
      <h1>语音交互测试</h1>
      <p>仅保留基础语音交互：创建会话、开始监听、停止监听、播放 TTS、查看识别与回复结果。</p>
    </div>

    <div class="toolbar">
      <button id="newSessionBtn">新建会话</button>
      <button id="startBtn" class="primary">开始监听</button>
      <button id="stopBtn" disabled>停止监听</button>
      <button id="probeBtn">探测 TTS</button>
      <button id="clearLogBtn">清空日志</button>
    </div>

    <div class="meta">
      <div class="card">
        <div class="label">连接状态</div>
        <div id="status" class="value">未连接</div>
      </div>
      <div class="card">
        <div class="label">当前会话</div>
        <div id="sessionId" class="value">尚未创建</div>
      </div>
      <div class="card">
        <div class="label">匿名用户 ID</div>
        <div id="userId" class="value"></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">ASR 部分结果</div>
        <div id="partialText" class="value">暂无</div>
      </div>
      <div class="card">
        <div class="label">ASR 最终结果</div>
        <div id="finalText" class="value">暂无</div>
      </div>
      <div class="card">
        <div class="label">助手回复文本</div>
        <div id="replyText" class="value">暂无</div>
      </div>
      <div class="card">
        <div class="label">性能指标</div>
        <pre id="perfText">暂无</pre>
      </div>
      <div class="card full">
        <div class="label">运行日志</div>
        <pre id="logText"></pre>
      </div>
    </div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const probeBtn = document.getElementById('probeBtn');
    const newSessionBtn = document.getElementById('newSessionBtn');
    const clearLogBtn = document.getElementById('clearLogBtn');

    const statusEl = document.getElementById('status');
    const sessionIdEl = document.getElementById('sessionId');
    const userIdEl = document.getElementById('userId');
    const partialTextEl = document.getElementById('partialText');
    const finalTextEl = document.getElementById('finalText');
    const replyTextEl = document.getElementById('replyText');
    const perfTextEl = document.getElementById('perfText');
    const logTextEl = document.getElementById('logText');

    let ws = null;
    let audioCtx = null;
    let processor = null;
    let micStream = null;
    let inputSampleRate = 48000;
    let currentSessionId = null;
    let ttsSampleRate = 24000;
    let ttsPlaying = false;
    let localSpeechChunks = 0;
    let lastClientInterruptAt = 0;

    let userId = localStorage.getItem('voice_user_id');
    if (!userId) {
      userId = 'user_' + Math.random().toString(36).slice(2, 12);
      localStorage.setItem('voice_user_id', userId);
    }
    userIdEl.textContent = userId;

    function log(message) {
      const line = typeof message === 'string' ? message : JSON.stringify(message, null, 2);
      logTextEl.textContent += line + '\n';
      logTextEl.scrollTop = logTextEl.scrollHeight;
    }

    function setStatus(text, kind = 'normal') {
      statusEl.textContent = text;
      statusEl.className = 'value';
      if (kind === 'ready') statusEl.classList.add('status-ready');
      if (kind === 'error') statusEl.classList.add('status-error');
    }

    function resetPanels() {
      partialTextEl.textContent = '暂无';
      finalTextEl.textContent = '暂无';
      replyTextEl.textContent = '暂无';
      perfTextEl.textContent = '暂无';
    }

    function downloadBlob(filename, content, type) {
      const blob = new Blob([content], { type: type || 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    const pcmPlayer = (() => {
      let ctx = null;
      let node = null;
      let buffer = new Float32Array(0);
      let outRate = 48000;

      function ensureInit() {
        if (ctx) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        outRate = ctx.sampleRate;
        node = ctx.createScriptProcessor(4096, 1, 1);
        node.onaudioprocess = (event) => {
          const out = event.outputBuffer.getChannelData(0);
          const need = out.length;
          if (buffer.length >= need) {
            out.set(buffer.subarray(0, need));
            buffer = buffer.subarray(need);
          } else {
            out.fill(0);
          }
        };
        node.connect(ctx.destination);
      }

      function pushPCM16(chunk, inRate = 16000) {
        ensureInit();
        const int16 = new Int16Array(chunk.buffer, chunk.byteOffset, Math.floor(chunk.byteLength / 2));
        const source = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i += 1) source[i] = int16[i] / 32768;

        const ratio = outRate / inRate;
        const outLen = Math.max(1, Math.floor(source.length * ratio));
        const out = new Float32Array(outLen);
        for (let i = 0; i < outLen; i += 1) {
          const srcPos = i / ratio;
          const idx = Math.floor(srcPos);
          const frac = srcPos - idx;
          const s0 = source[idx] || 0;
          const s1 = source[idx + 1] || s0;
          out[i] = s0 + (s1 - s0) * frac;
        }

        const merged = new Float32Array(buffer.length + out.length);
        merged.set(buffer, 0);
        merged.set(out, buffer.length);
        buffer = merged;
      }

      function reset() {
        buffer = new Float32Array(0);
      }

      return { ensureInit, pushPCM16, reset };
    })();

    async function createSession() {
      const response = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId }),
      });
      const data = await response.json();
      if (!response.ok || !data.session_id) {
        throw new Error(data.error || 'create_session_failed');
      }
      currentSessionId = data.session_id;
      sessionIdEl.textContent = currentSessionId;
      log({ event: 'session_created', session_id: currentSessionId });
      return currentSessionId;
    }

    async function ensureSession() {
      if (currentSessionId) return currentSessionId;
      return createSession();
    }

    async function start() {
      if (ws) return;

      resetPanels();
      pcmPlayer.ensureInit();

      try {
        await ensureSession();
      } catch (error) {
        setStatus('创建会话失败', 'error');
        log({ event: 'session_error', detail: String(error) });
        return;
      }

      try {
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
          },
        });
      } catch (error) {
        setStatus('麦克风不可用或权限被拒绝', 'error');
        log({ event: 'mic_error', detail: String(error) });
        return;
      }

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      inputSampleRate = audioCtx.sampleRate;
      const source = audioCtx.createMediaStreamSource(micStream);
      processor = audioCtx.createScriptProcessor(4096, 1, 1);

      const chunkMs = 200;
      const targetSamples = Math.floor(16000 * chunkMs / 1000);
      let acc = [];
      let accSamples = 0;

      processor.onaudioprocess = (event) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const input = event.inputBuffer.getChannelData(0);
        let energySum = 0;
        for (let i = 0; i < input.length; i += 1) {
          energySum += Math.abs(input[i]);
        }
        const meanEnergy = input.length ? (energySum / input.length) : 0;
        const nowMs = Date.now();
        if (ttsPlaying && meanEnergy >= 0.018) {
          localSpeechChunks += 1;
        } else {
          localSpeechChunks = 0;
        }
        if (
          ttsPlaying
          && localSpeechChunks >= 2
          && nowMs - lastClientInterruptAt > 1200
        ) {
          try {
            ws.send(JSON.stringify({ cmd: 'interrupt' }));
            log({ event: 'client_interrupt', mean_energy: Number(meanEnergy.toFixed(4)) });
          } catch (_) { }
          lastClientInterruptAt = nowMs;
          localSpeechChunks = 0;
          ttsPlaying = false;
          pcmPlayer.reset();
        }
        const ratio = 16000 / inputSampleRate;
        const outLen = Math.max(1, Math.floor(input.length * ratio));
        const out = new Float32Array(outLen);

        for (let i = 0; i < outLen; i += 1) {
          const srcPos = i / ratio;
          const idx = Math.floor(srcPos);
          const frac = srcPos - idx;
          const s0 = input[idx] || 0;
          const s1 = input[idx + 1] || s0;
          out[i] = s0 + (s1 - s0) * frac;
        }

        acc.push(out);
        accSamples += out.length;

        if (accSamples >= targetSamples) {
          const merged = new Float32Array(accSamples);
          let offset = 0;
          for (const part of acc) {
            merged.set(part, offset);
            offset += part.length;
          }
          acc = [];
          accSamples = 0;

          const int16 = new Int16Array(merged.length);
          for (let i = 0; i < merged.length; i += 1) {
            const sample = Math.max(-1, Math.min(1, merged[i]));
            int16[i] = sample < 0 ? sample * 32768 : sample * 32767;
          }
          ws.send(new Uint8Array(int16.buffer));
        }
      };

      source.connect(processor);
      processor.connect(audioCtx.destination);
      if (audioCtx.state === 'suspended') {
        try { await audioCtx.resume(); } catch (_) { }
      }

      const origin = window.location.origin || 'http://localhost:8000';
      const wsUrl = new URL('/ws/voice', origin);
      wsUrl.protocol = wsUrl.protocol === 'https:' ? 'wss:' : 'ws:';
      wsUrl.searchParams.set('session_id', currentSessionId);
      wsUrl.searchParams.set('user_id', userId);

      ws = new WebSocket(wsUrl.href);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        setStatus('已连接，开始监听', 'ready');
        log({ event: 'ws_open', session_id: currentSessionId });
      };

      ws.onclose = () => {
        setStatus('连接已关闭');
        log({ event: 'ws_close' });
        ws = null;
      };

      ws.onerror = () => {
        setStatus('连接错误', 'error');
        log({ event: 'ws_error' });
      };

      ws.onmessage = (event) => {
        if (typeof event.data === 'string') {
          try {
            const payload = JSON.parse(event.data);
            log(payload);

            if (payload.event === 'session_error' || payload.event === 'voice_init_error' || payload.event === 'error') {
              setStatus(payload.detail || payload.event, 'error');
            }
            if (payload.event === 'tts_ready' || payload.event === 'asr_connected') {
              setStatus('语音服务已就绪', 'ready');
            }
            if (payload.event === 'asr_partial') {
              partialTextEl.textContent = payload.text || '暂无';
            }
            if (payload.event === 'asr_text') {
              finalTextEl.textContent = payload.text || '暂无';
              partialTextEl.textContent = '暂无';
            }
            if (payload.event === 'llm_text') {
              replyTextEl.textContent = payload.text || '暂无';
            }
            if (payload.event === 'perf') {
              perfTextEl.textContent = JSON.stringify(payload.metrics || {}, null, 2);
            }
            if (payload.event === 'tts_start' && typeof payload.rate === 'number') {
              ttsSampleRate = payload.rate;
              ttsPlaying = true;
            }
            if (payload.event === 'tts_reset') {
              ttsPlaying = false;
              pcmPlayer.reset();
            }
            if (payload.event === 'tts_done' || payload.event === 'tts_interrupted') {
              ttsPlaying = false;
            }
          } catch (error) {
            log({ event: 'parse_error', detail: String(error), raw: event.data });
          }
        } else {
          pcmPlayer.pushPCM16(new Uint8Array(event.data), ttsSampleRate);
        }
      };

      startBtn.disabled = true;
      stopBtn.disabled = false;
    }

    function stop() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        try { ws.send(JSON.stringify({ cmd: 'stop' })); } catch (_) { }
      }
      if (processor) {
        processor.disconnect();
        processor = null;
      }
      if (audioCtx) {
        audioCtx.close();
        audioCtx = null;
      }
      if (micStream) {
        micStream.getTracks().forEach(track => track.stop());
        micStream = null;
      }
      if (ws) {
        ws.close();
        ws = null;
      }
      ttsPlaying = false;
      localSpeechChunks = 0;
      pcmPlayer.reset();
      startBtn.disabled = false;
      stopBtn.disabled = true;
      setStatus('未连接');
    }

    async function probeTts() {
      const origin = window.location.origin || 'http://localhost:8000';
      const probeUrl = new URL('/api/tts_probe', origin);
      try {
        const response = await fetch(probeUrl.href);
        const data = await response.json();
        log(data);
      } catch (error) {
        log({ event: 'probe_error', detail: String(error) });
      }
    }

    newSessionBtn.onclick = async () => {
      if (ws) stop();
      resetPanels();
      try {
        await createSession();
      } catch (error) {
        setStatus('创建会话失败', 'error');
        log({ event: 'session_error', detail: String(error) });
      }
    };

    startBtn.onclick = start;
    stopBtn.onclick = stop;
    probeBtn.onclick = probeTts;
    clearLogBtn.onclick = () => {
      logTextEl.textContent = '';
    };

    setStatus('未连接');
    sessionIdEl.textContent = '尚未创建';
  </script>
</body>

</html>
